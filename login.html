<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm Management System</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

    <div class="login-overlay">

        <div class="login-box">

            <h1>🌱 Smart Farm</h1>

            <h3>Management System</h3>

            <p>
                Authorized Workers Only
            </p>

            <form id="loginForm">

                <input
                type="text"
                id="workerId"
                placeholder="Worker ID"
                required>

                <input
                type="password"
                id="password"
                placeholder="Password"
                required>

                <button type="submit">
                    Login
                </button>

            </form>

            <div class="sample-login">

                <h4>Demo Login</h4>

                <p>ID: SF001</p>

                <p>Password: farm123</p>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
