<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>🌱 Smart Farm</h2>
<a href="login.html">login</a>
        <a href="index.html">Dashboard</a>
        <a href="monitoring.html">Monitoring</a>
        <a href="reports.html">Reports</a>
        <a href="complaints.html">compaints</a>
    </aside>

    <main class="main-content">

        <header>
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <h1>Dashboard</h1>
        </header>

        <div class="hero">
            <img src="images/farm-banner.jpg" alt="Farm Banner">
        </div>

        <div class="cards">

            <div class="card">
                <img src="images/maize.jpg" alt="">
                <h3>Total Crops</h3>
                <p>1200</p>
            </div>

            <div class="card">
                <img src="images/workers.jpg" alt="">
                <h3>Workers</h3>
                <p>25</p>
            </div>

            <div class="card">
                <img src="images/water.jpg" alt="">
                <h3>Water Level</h3>
                <p>85%</p>
            </div>

            <div class="card">
                <img src="images/revenue.jpg" alt="">
                <h3>Revenue</h3>
                <p>₦2,500,000</p>
            </div>

        </div>

        <section class="overview">
            <h1>Farm Overview</h1>

            <p style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; font-size: large;">
                Welcome to the Smart Farm Dashboard.
                Monitor crop growth, workers,
                irrigation and farm productivity.
            </p>

            <button onclick="openModal()">
                Add New Crop
            </button>
        </section>

    </main>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h2>Add New Crop</h2>

<input type="text" placeholder="Crop Name">

<input type="number" placeholder="Quantity">

<button>Save</button>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
